spring:
  application:
    name: fitme
  profiles:
    active: dev
  config:
    import: optional:file:${user.dir}/.env[.properties]
  web:
    encoding:
      charset: UTF-8
      force: true
      enabled: true
  jpa:
    properties:
      hibernate:
        show-sql: true
        format_sql: true
        hbm2ddl:
          auto: none
  hibernate:
    ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration

application:
  scheduling:
    termin-horizon-days: 90

security:
  jwt:
    cookie-name: fitme_cookie
    secret-key: ${SECRET_KEY}
    cookie-expiry: 604800
    cookie-secure: true

infobip:
  api-key: ${INFOBIP_API_KEY:}
  base-url: ${INFOBIP_BASE_URL:}
  whatsapp-sender: ${INFOBIP_WHATSAPP_SENDER:}
  templates:
    otp: fitme_otp
    reminder: fitme_reminder
