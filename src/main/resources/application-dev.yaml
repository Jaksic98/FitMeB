spring:
  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    root: DEBUG
    com.consi.fitme: DEBUG
    org.flywaydb: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/dev-app.log
  logback:
    rollingpolicy:
      file-name-pattern: logs/dev-app-%d{yyyy-MM-dd}.log
      max-history: 5
      total-size-cap: 512MB
