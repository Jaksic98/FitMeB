services:
  postgres:
    image: postgres:16
    container_name: fitme-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - fitme_pgdata:/var/lib/postgresql/data

volumes:
  fitme_pgdata:
